name: ripple
description: "Ripple Chat - Liquid Glass Aquatic AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.1

  # Authentication
  google_sign_in: ^6.2.1

  # Environment
  flutter_dotenv: ^5.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Calls — Agora Video & Audio (replaces ZegoCloud due to build errors)
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # Storage
  supabase_flutter: ^2.3.0

  # Push Notifications (free alternative to Cloud Functions)
  onesignal_flutter: ^5.4.1

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.3.0

  # Animations
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11

  # Notifications

  # Utilities
  open_filex: ^4.6.0
  shimmer: ^3.0.0
  dio: ^5.7.0
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1

  # Profile Features
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  firebase_database: ^11.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ripple_logo.png"
  adaptive_icon_background: "#060D1A"
  adaptive_icon_foreground: "assets/images/ripple_logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
