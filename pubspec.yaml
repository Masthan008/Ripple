name: ripple
description: "Ripple Chat - Liquid Glass Aquatic AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.1

  # Authentication
  google_sign_in: ^6.2.1
  flutter_svg: ^2.0.10

  # Environment
  flutter_dotenv: ^5.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Calls — Daily.co via InAppWebView (camera/mic support)
  flutter_inappwebview: ^6.1.5
  permission_handler: ^11.3.1

  # Storage
  supabase_flutter: ^2.3.0

  # Push Notifications (free alternative to Cloud Functions)
  onesignal_flutter: ^5.4.1

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.3.0

  # Phase 2 — Voice & Media
  record: ^5.0.5
  just_audio: ^0.9.40
  video_thumbnail: ^0.5.3
  flutter_cache_manager: ^3.3.1
  any_link_preview: ^3.0.2
  video_player: ^2.9.2

  # Animations
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11
  visibility_detector: ^0.4.0+2
  flutter_animate: ^4.5.0

  # Notifications

  # Utilities
  open_filex: ^4.6.0
  shimmer: ^3.0.0
  dio: ^5.7.0
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1

  # Profile Features
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  firebase_database: ^11.3.10

  # Phase 6 — Privacy & Security
  local_auth: ^2.3.0
  flutter_windowmanager_plus: ^1.0.0
  crypto: ^3.0.3
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ripple_logo.png"
  adaptive_icon_background: "#060D1A"
  adaptive_icon_foreground: "assets/images/ripple_logo.png"

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
