name: ripple
description: "Ripple Chat - Liquid Glass Aquatic AI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.1
  firebase_messaging: ^15.2.5

  # Authentication
  google_sign_in: ^6.2.1

  # Environment
  flutter_dotenv: ^5.2.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Calls
  # zego_uikit_prebuilt_call: ^4.12.0  # TODO: Uncomment when configuring ZegoCloud

  # Storage
  supabase_flutter: ^2.3.0

  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  file_picker: ^8.1.7
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.3.0

  # Animations
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utilities
  open_filex: ^4.6.0
  shimmer: ^3.0.0
  dio: ^5.7.0
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
